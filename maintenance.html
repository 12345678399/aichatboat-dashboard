<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under Maintenance - NebulaX</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Manrope:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/variables.css">
    <style>
        body {
            font-family: var(--font-family-base);
            background-color: var(--bg-body);
            color: var(--text-main);
            height: 100vh;
            display: grid;
            place-items: center;
            margin: 0;
            text-align: center;
        }

        .maintenance-container {
            background: var(--bg-surface);
            padding: var(--space-8);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-xl);
            max-width: 500px;
            width: 90%;
            border: 1px solid var(--border-color);
        }

        h1 {
            font-family: var(--font-family-heading);
            font-size: 2rem;
            margin-bottom: var(--space-4);
            color: var(--primary);
        }

        p {
            color: var(--text-secondary);
            margin-bottom: var(--space-6);
            line-height: 1.6;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 10px 20px;
            background-color: var(--primary);
            color: #fff;
            text-decoration: none;
            border-radius: var(--radius-md);
            font-weight: 500;
            transition: opacity 0.2s;
        }

        .btn:hover {
            opacity: 0.9;
        }

        .illustration {
            width: 150px;
            margin-bottom: var(--space-6);
            opacity: 0.8;
        }
    </style>
</head>

<body>
    <div class="maintenance-container">
        <svg class="illustration" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"
            stroke-linecap="round" stroke-linejoin="round" style="color: var(--primary);">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="12" y1="8" x2="12" y2="12"></line>
            <line x1="12" y1="16" x2="12.01" y2="16"></line>
        </svg>
        <h1>Under Maintenance</h1>
        <p>
            We're currently updating the NebulaX platform to bring you an even better experience.
            We'll be back shortly. Thank you for your patience!
        </p>
        <a href="index.html" class="btn">Check Status</a>
    </div>
</body>

</html>
